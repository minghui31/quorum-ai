council: careers
title: "Offer A (big pay, boring) vs Offer B (less pay, rocket ship)?"
language: auto
case: |
  Two offers on the table. Offer A: a large stable company, 30% more pay,
  mature codebase, slow promotion track, sponsors visas reliably. Offer B: a
  40-person startup that just raised Series B, more equity, chaotic but I'd
  own a whole product area; visa sponsorship possible but less proven. I'm
  three years into my career and want to be a staff engineer or founder by 30.
  Which do I take?
